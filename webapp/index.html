<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1b5e20">
<title>Rzeznik Golf Tracker</title>
<!-- EmailJS: lets the app auto-send the round straight from the browser. Loaded
     async so the tracker still works offline; only the send button needs it. -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" async></script>
<style>
  :root { --green:#1b5e20; --green2:#2e7d32; --green3:#43a047; --bg:#0c120c; --card:#161d16; --card2:#1d261c;
          --line:#33402f; --txt:#e8f0e2; --muted:#9bb08c; --gold:#e8c98c; --accent:#7bd389; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--txt);
         font-size:17px; padding-bottom:30px; }
  header { background:linear-gradient(180deg,var(--green) 0%,#164a1a 100%); padding:11px 14px;
           position:sticky; top:0; z-index:10; box-shadow:0 2px 12px rgba(0,0,0,.4); }
  header .row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  header h1 { font-size:16px; margin:0; letter-spacing:.3px; }
  header .score { font-size:13px; color:#cfe8c4; text-align:right; line-height:1.3; }
  header .score b { color:#fff; font-size:15px; }
  .wrap { padding:14px; max-width:560px; margin:0 auto; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:14px; }
  h2 { font-size:15px; margin:0 0 10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  label { display:block; font-size:13px; color:var(--muted); margin:10px 0 4px; }
  input, textarea { width:100%; padding:12px; border-radius:10px; border:1px solid var(--line);
          background:#0c100b; color:var(--txt); font-size:16px; }
  .btn { display:inline-block; padding:14px 16px; border-radius:12px; border:1px solid var(--line);
         background:#222a20; color:var(--txt); font-size:16px; font-weight:600; cursor:pointer; }
  .btn:active { transform:scale(.97); }
  .btn.primary { background:var(--green2); border-color:var(--green2); }
  .btn.wide { display:block; width:100%; text-align:center; margin-top:10px; }
  .btn.sm { padding:9px 12px; font-size:14px; }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .chip { padding:12px 8px; border-radius:12px; border:1px solid var(--line); background:#222a20;
          text-align:center; font-weight:600; cursor:pointer; }
  .chip.on { background:var(--green2); border-color:var(--accent); }
  .outcome { padding:20px 8px; font-size:18px; }
  .outcome.hole { background:#3a2f10; border-color:var(--gold); color:var(--gold); }
  .pill { display:inline-block; padding:3px 9px; border-radius:999px; background:#222a20;
          border:1px solid var(--line); font-size:13px; margin:3px 4px 0 0; }
  .pill.best { background:var(--green2); border-color:var(--accent); }
  .pill.ob { opacity:.5; text-decoration:line-through; }
  .pill.skip { opacity:.6; font-style:italic; }
  .skipbtn { display:block; width:100%; text-align:center; margin-top:10px; padding:11px 12px;
          font-size:14px; background:#1c231b; border:1px dashed var(--line); color:var(--muted); }
  .muted { color:var(--muted); font-size:14px; }
  .holeinfo { font-size:14px; color:#cfe8c4; margin-bottom:8px; line-height:1.4; }
  .note { font-size:13px; color:var(--gold); }
  textarea#payload { height:150px; font-family:monospace; font-size:12px; }

  /* ---- Hole / Par / Stroke hero ---- */
  .hero { background:linear-gradient(165deg,#1f2a1d 0%,#141c13 100%); border:1px solid var(--line);
          border-radius:18px; padding:16px; margin-bottom:14px; overflow:hidden; }
  .hero-top { display:flex; align-items:center; gap:14px; }
  .holebadge { flex:0 0 auto; width:74px; height:74px; border-radius:18px; position:relative;
          background:radial-gradient(circle at 30% 25%,var(--green3),var(--green) 75%);
          box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 4px 14px rgba(0,0,0,.35);
          display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; }
  .holebadge .lbl { font-size:10px; letter-spacing:2px; text-transform:uppercase; opacity:.85; margin-top:2px; }
  .holebadge .num { font-size:34px; font-weight:800; line-height:1; }
  .hero-meta { flex:1 1 auto; min-width:0; }
  .parrow { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .par { font-size:15px; font-weight:700; color:var(--gold); background:rgba(232,201,140,.12);
         border:1px solid rgba(232,201,140,.4); padding:4px 12px; border-radius:999px; }
  .holename { font-size:13px; color:var(--muted); margin-top:6px; line-height:1.35; }
  .route { color:#cfe8c4; }
  .route .arrow { color:var(--accent); font-weight:700; padding:0 4px; }
  .holedots { display:flex; gap:6px; margin-top:14px; }
  .holedots span { flex:1; height:6px; border-radius:3px; background:#2a352580; }
  .holedots span.done { background:var(--green3); }
  .holedots span.cur { background:var(--gold); box-shadow:0 0 8px rgba(232,201,140,.6); }

  /* ---- Stroke tracker ---- */
  .strokebar { display:flex; align-items:center; gap:12px; margin-top:14px; padding-top:14px;
          border-top:1px solid var(--line); }
  .strokenum { display:flex; flex-direction:column; line-height:1; }
  .strokenum .k { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
  .strokenum .v { font-size:30px; font-weight:800; color:#fff; }
  .strokedots { display:flex; gap:7px; flex-wrap:wrap; flex:1; }
  .strokedots span { width:13px; height:13px; border-radius:50%; background:#2a3525;
          border:1px solid var(--line); }
  .strokedots span.done { background:var(--green3); border-color:var(--green3); }
  .strokedots span.cur { background:var(--gold); border-color:var(--gold);
          box-shadow:0 0 9px rgba(232,201,140,.7); }
  .vspar { font-size:13px; font-weight:700; padding:4px 10px; border-radius:999px; white-space:nowrap; }
  .vspar.under { color:var(--accent); background:rgba(123,211,137,.12); border:1px solid rgba(123,211,137,.4); }
  .vspar.over { color:#e8a18c; background:rgba(232,161,140,.12); border:1px solid rgba(232,161,140,.4); }
  .vspar.even { color:var(--muted); background:#222a20; border:1px solid var(--line); }

  .turn { font-size:21px; font-weight:700; margin:4px 0 2px; }
  .turn .who { color:var(--accent); }
  .fromspot { font-size:13px; color:var(--muted); margin-bottom:6px; }

  /* ---- Player picker (setup) ---- */
  .prow { display:flex; align-items:center; gap:10px; padding:12px; border-radius:12px;
          border:1px solid var(--line); background:#222a20; margin-bottom:8px; transition:opacity .15s; }
  .prow.off { opacity:.5; }
  .pdot { width:10px; height:10px; border-radius:50%; background:#566a4d; flex:0 0 auto; }
  .prow.on .pdot { background:var(--accent); box-shadow:0 0 8px rgba(123,211,137,.6); }
  .pname { font-weight:700; }
  .pstate { margin-left:auto; font-size:13px; color:var(--muted); }
  .prow.on .pstate { color:var(--accent); }
  .ptoggle { flex:0 0 auto; width:36px; height:36px; border-radius:50%; border:1px solid var(--line);
          font-size:16px; font-weight:800; line-height:1; cursor:pointer; }
  .prow.on .ptoggle { background:#3a2222; border-color:#7a4a4a; color:#f0c0c0; }   /* ✕ = sit out */
  .prow.off .ptoggle { background:var(--green2); border-color:var(--accent); color:#fff; } /* ＋ = add */
  .ptoggle:active { transform:scale(.92); }
  .addrow { display:flex; gap:8px; margin-top:4px; }
  .addrow input { flex:1; }
  .warnrow { font-size:13px; color:var(--gold); padding:2px; }
</style>
</head>
<body>
<header>
  <div class="row">
    <h1>⛳ Rzeznik Golf Tracker</h1>
    <div class="score" id="hdrScore"></div>
  </div>
</header>
<div class="wrap" id="app"></div>

<script>
// ---- Course (kept in sync with data/course.yaml) -------------------------
const COURSE = {
  name: "Rzeznik Golf Course",
  target: 20,
  holes: [
    {hole:1, par:3, start:"Behind the pear tree", target:"Behind the side pine", notes:""},
    {hole:2, par:3, start:"Where hole 1 ends", target:"Behind the brush well", notes:"No line of sight."},
    {hole:3, par:3, start:"Back-left tree, by the pine", target:"Behind the pear tree corner", notes:"No line of sight."},
    {hole:4, par:4, start:"Top of the lawn by the sidewalk", target:"Between back-left tree & porch tree", notes:"Hooks around house. First shot LEFTY ONLY."},
    {hole:5, par:3, start:"Where hole 4 ends", target:"Back-right corner, 10 ft off small pine", notes:"Safety routing."},
    {hole:6, par:4, start:"Where hole 5 ends", target:"Front tree, Murray side (hole left of it)", notes:"Curves around house."},
  ]
};
const ROSTER = [{player_id:1, name:"Tommy"}];   // matches data/players.csv
// outcomes shown on the buttons; `k` matches schema.OUTCOMES
const OUTCOMES = [
  {k:"good",      label:"Good shot"},
  {k:"short_pop", label:"Short pop"},
  {k:"grounder",  label:"Grounder"},
  {k:"overshoot", label:"Overshoot"},
  {k:"ob",        label:"Out of bounds"},
  {k:"hole",      label:"HOLE 🏆"},
];
const LABEL = Object.fromEntries(OUTCOMES.map(o => [o.k, o.label]));
LABEL.skip = "Skipped";   // a player who sat out this stroke (not a real attempt)
// Distance to the target from the shared spot the whole stroke shoots from.
// Stroke 1 is auto "tee"; later strokes pick one of these. `k` matches schema.DISTANCES.
const DISTANCES = [
  {k:"long",   label:"Long"},
  {k:"mid",    label:"Mid"},
  {k:"short",  label:"Short"},
  {k:"tap_in", label:"Tap-in"},
];
const DLABEL = {tee:"Tee", long:"Long", mid:"Mid", short:"Short", tap_in:"Tap-in"};
const GROUNDS = [{k:"dry",label:"Dry"},{k:"wet",label:"Wet"}];
const WINDS = [{k:"calm",label:"Calm"},{k:"breezy",label:"Breezy"},{k:"windy",label:"Windy"}];
const SCHEMA_VERSION = 2;     // keep in sync with golf/schema.py
const EMAIL = "trzeznik29@gmail.com";
// --- EmailJS auto-send config -------------------------------------------------
// Fill these from your EmailJS dashboard (https://dashboard.emailjs.com):
//   publicKey  -> Account → General → Public Key
//   serviceId  -> Email Services → (your Gmail service) → Service ID
//   templateId -> Email Templates → (your template) → Template ID
// The template needs these variables: {{subject}}, {{round_date}}, {{team_total}},
// {{round_json}}  (and set the template's "To" field to {{to_email}}).
// Until all three are filled, the Send button falls back to opening your mail app.
const EMAILJS = {
  publicKey:  "_spHeNzXj5ZhheEwo",
  serviceId:  "service_k9astb7",
  templateId: "template_mcelcxq",
};
const EMAILJS_READY = !/YOUR_/.test(EMAILJS.publicKey + EMAILJS.serviceId + EMAILJS.templateId);
const KEY = "rzeznik_round_v3";   // bumped: round state now carries distance/conditions
const HOLES = COURSE.holes.length;
function uuid(){ return (crypto.randomUUID ? crypto.randomUUID()
  : 'r-'+Date.now()+'-'+Math.random().toString(16).slice(2)); }

// ---- State ---------------------------------------------------------------
let S = load() || newRound();
function newRound() {
  // Local date (not UTC) so a round logged near midnight gets the right day.
  const n = new Date();
  const today = new Date(n.getTime() - n.getTimezoneOffset()*60000).toISOString().slice(0,10);
  return { date:today, notes:"", ground:"", wind:"",
           client_round_id:uuid(), schema_version:SCHEMA_VERSION,
           roster:JSON.parse(JSON.stringify(ROSTER)), active:[1],
           shots:[], started:false, finished:false,
           hole:1, strokeNum:1, dist:"tee", order:[], turnIdx:0, phase:"shooting",
           strokeOutcomes:{}, mulliganUsed:false, pendMull:false };
}
function save() { localStorage.setItem(KEY, JSON.stringify(S)); }
function load() { try { return JSON.parse(localStorage.getItem(KEY)); } catch(e){ return null; } }

// ---- Helpers -------------------------------------------------------------
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function nm(pid){ const p=S.roster.find(x=>x.player_id===pid); return p?p.name:("P"+pid); }
function realShots(){ return S.shots.filter(x=>!x.mulligan); }
function holeStrokes(hole){
  const ss=realShots().filter(x=>x.hole===hole).map(x=>x.stroke_num);
  return ss.length ? Math.max(...ss) : 0;
}
function teamTotal(){ let t=0; for(const h of COURSE.holes) t+=holeStrokes(h.hole); return t; }

// ---- Render --------------------------------------------------------------
const app = document.getElementById("app");
function render() {
  save();
  document.getElementById("hdrScore").innerHTML =
    S.started ? `<b>${teamTotal()}</b> strokes<br>target ${COURSE.target}` : "";
  if (!S.started) return renderSetup();
  if (S.finished) return renderFinish();
  renderPlay();
}

function renderSetup() {
  app.innerHTML = `
    <div class="card">
      <h2>New round</h2>
      <label>Date</label>
      <input type="date" id="d" value="${S.date}">
      <label>Who's playing? (best-ball scramble, 1–3)</label>
      <div id="players"></div>
      <div class="addrow">
        <input id="newp" placeholder="add a player by name">
        <button class="btn sm" onclick="addPlayer()">+ Add</button>
      </div>
      <label>Conditions (optional)</label>
      <div id="conds"></div>
      <label>Round notes (optional)</label>
      <textarea id="notes" rows="2">${S.notes||""}</textarea>
      <button class="btn primary wide" onclick="startRound()">Start round →</button>
    </div>`;
  renderPlayers();
  renderConditions();
}
function renderConditions(){
  const box = document.getElementById("conds");
  if(!box) return;
  const row = (opts, cur, fn) => `<div class="grid" style="grid-template-columns:repeat(${opts.length},1fr);margin-bottom:8px">`
    + opts.map(o=>`<div class="chip ${cur===o.k?'on':''}" onclick="${fn}('${o.k}')">${o.label}</div>`).join("") + `</div>`;
  box.innerHTML = `<div class="muted" style="margin-bottom:4px">Ground</div>`
    + row(GROUNDS, S.ground, "setGround")
    + `<div class="muted" style="margin-bottom:4px">Wind</div>`
    + row(WINDS, S.wind, "setWind");
}
// Tapping the active chip again clears it (conditions stay optional).
function setGround(k){ S.ground = S.ground===k ? "" : k; save(); renderConditions(); }
function setWind(k){ S.wind = S.wind===k ? "" : k; save(); renderConditions(); }
// Just the player list, so toggling doesn't wipe the date/notes you typed.
function renderPlayers(){
  const box = document.getElementById("players");
  if(!box) return;
  box.innerHTML = S.roster.map(p => {
    const on = S.active.includes(p.player_id);
    return `<div class="prow ${on?'on':'off'}">
        <span class="pdot"></span>
        <span class="pname">${p.name}</span>
        <span class="pstate">${on?'Playing':'Sitting out'}</span>
        <button class="ptoggle" onclick="togglePlayer(${p.player_id})"
          title="${on?'Sit out this round':'Add to this round'}">${on?'✕':'＋'}</button>
      </div>`;
  }).join("") + (S.active.length ? "" : `<div class="warnrow">⚠ Pick at least one player to start.</div>`);
}
function togglePlayer(id){
  S.active = S.active.includes(id) ? S.active.filter(x=>x!==id) : [...S.active,id];
  save(); renderPlayers();
}
function addPlayer(){
  const inp = document.getElementById("newp");
  const v = inp.value.trim();
  if(!v) return;
  const id = Math.max(0,...S.roster.map(p=>p.player_id))+1;
  S.roster.push({player_id:id, name:v}); S.active.push(id);
  inp.value = ""; save(); renderPlayers();
}
function startRound(){
  S.date = document.getElementById("d").value;
  S.notes = document.getElementById("notes").value;
  if(!S.active.length){ alert("Pick at least one player."); return; }
  S.started = true; startHole();
}

// ---- Game flow -----------------------------------------------------------
function startHole(){
  S.strokeNum = 1;
  S.dist = "tee";                       // stroke 1 is always the tee
  S.order = shuffle(S.active);          // random starter each hole
  S.turnIdx = 0; S.phase = "shooting"; S.strokeOutcomes = {}; S.pendMull = false;
  render();
}
function nextStroke(leader){
  if(leader != null){                   // advanced to a new spot -> ask its distance
    S.order = [leader, ...S.active.filter(p=>p!==leader)];
    S.dist = null;
  }
  // all-OB keeps the same order/starter AND the same spot (distance unchanged)
  S.strokeNum++; S.turnIdx = 0; S.strokeOutcomes = {}; S.pendMull = false;
  S.phase = (leader != null) ? "distance" : "shooting";
  render();
}
function pickDistance(k){ S.dist = k; S.phase = "shooting"; render(); }
function endHole(){
  if(S.hole < HOLES){ S.hole++; startHole(); }
  else { S.finished = true; render(); }
}
function logOutcome(k){
  const pid = S.order[S.turnIdx];
  const shot_order = S.turnIdx + 1;
  if(S.pendMull){
    S.shots.push({ player_id:pid, hole:S.hole, stroke_num:S.strokeNum,
                   shot_order, outcome:k, distance:S.dist, best_ball:false,
                   mulligan:true, ts:Date.now() });
    S.mulliganUsed = true; S.pendMull = false;
    render(); return;                   // same player re-takes the shot
  }
  S.strokeOutcomes[pid] = k;
  S.turnIdx++;
  if(S.turnIdx < S.order.length){ render(); return; }
  resolveStroke();
}
function commitStroke(bestSet){
  const ts = Date.now();
  S.order.forEach((pid, i) => {
    S.shots.push({ player_id:pid, hole:S.hole, stroke_num:S.strokeNum, shot_order:i+1,
                   outcome:S.strokeOutcomes[pid], distance:S.dist,
                   best_ball:bestSet.has(pid), mulligan:false, ts });
  });
}
function playableSet(){ // balls eligible to be kept: not OB, not skipped
  return S.order.filter(p=>S.strokeOutcomes[p]!=="ob" && S.strokeOutcomes[p]!=="skip");
}
function resolveStroke(){
  const holers = S.order.filter(p=>S.strokeOutcomes[p]==="hole");
  if(holers.length){ commitStroke(new Set(holers)); endHole(); return; }
  const playable = playableSet();
  if(playable.length===0){ commitStroke(new Set()); nextStroke(null); return; } // all OB/skipped -> re-hit same spot
  if(playable.length===1){ commitStroke(new Set(playable)); nextStroke(playable[0]); return; }
  S.phase = "pickbest"; render();        // ask who had the best ball
}
function pickBest(pid){ commitStroke(new Set([pid])); nextStroke(pid); }

function undo(){
  if(S.pendMull){ S.pendMull=false; render(); return; }
  // At the distance prompt (start of a fresh stroke) -> undo the previous commit.
  if(S.phase==="distance"){ popLastStroke(); return; }
  if(S.phase==="pickbest"){ S.phase="shooting"; S.turnIdx=S.order.length-1;
    delete S.strokeOutcomes[S.order[S.turnIdx]]; render(); return; }
  if(S.turnIdx>0){ S.turnIdx--; delete S.strokeOutcomes[S.order[S.turnIdx]]; render(); return; }
  popLastStroke();                       // at the start of a stroke -> undo previous commit
}
function popLastStroke(){
  const inHole = S.shots.filter(x=>x.hole===S.hole);
  if(!inHole.length) return;             // nothing to undo this hole
  const prev = Math.max(...inHole.map(x=>x.stroke_num));
  const removed = S.shots.filter(x=>x.hole===S.hole && x.stroke_num===prev);
  S.shots = S.shots.filter(x=>!(x.hole===S.hole && x.stroke_num===prev));
  if(removed.some(x=>x.mulligan)) S.mulliganUsed = false;
  // rebuild that stroke's order from the removed real shots' shot_order
  const real = removed.filter(x=>!x.mulligan).sort((a,b)=>a.shot_order-b.shot_order);
  S.order = real.length ? real.map(x=>x.player_id) : S.order;
  S.dist = real.length ? real[0].distance : (prev===1 ? "tee" : S.dist);
  S.strokeNum = prev; S.turnIdx = 0; S.phase = "shooting"; S.strokeOutcomes = {}; S.pendMull = false;
  render();
}

function heroHTML(h){
  // hole progress dots (1..HOLES)
  const holeDots = COURSE.holes.map(x=>{
    const cls = x.hole<S.hole ? 'done' : x.hole===S.hole ? 'cur' : '';
    return `<span class="${cls}"></span>`;
  }).join("");
  // stroke dots: one slot per attempt, at least `par` slots wide
  const slots = Math.max(h.par, S.strokeNum);
  let strokeDots = "";
  for(let i=1;i<=slots;i++){
    const cls = i<S.strokeNum ? 'done' : i===S.strokeNum ? 'cur' : '';
    strokeDots += `<span class="${cls}"></span>`;
  }
  // pace vs par (current stroke number compared to par)
  const diff = S.strokeNum - h.par;
  const vs = diff<0 ? `<span class="vspar under">${-diff} to par</span>`
           : diff===0 ? `<span class="vspar even">at par</span>`
           : `<span class="vspar over">+${diff} over</span>`;
  return `
    <div class="hero">
      <div class="hero-top">
        <div class="holebadge"><div class="num">${h.hole}</div><div class="lbl">Hole</div></div>
        <div class="hero-meta">
          <div class="parrow">
            <span class="par">PAR ${h.par}</span>
            <span class="muted">Hole ${h.hole} of ${HOLES}</span>
          </div>
          <div class="holename"><span class="route">${h.start}<span class="arrow">→</span>${h.target}</span>
            ${h.notes?`<br><span class="note">⚠ ${h.notes}</span>`:""}</div>
        </div>
      </div>
      <div class="holedots">${holeDots}</div>
      <div class="strokebar">
        <div class="strokenum"><span class="k">Stroke</span><span class="v">${S.strokeNum}</span></div>
        <div class="strokedots">${strokeDots}</div>
        ${vs}
      </div>
    </div>`;
}

function renderPlay(){
  const h = COURSE.holes.find(x=>x.hole===S.hole);
  const pid = S.order[S.turnIdx];
  const spot = S.strokeNum===1 ? "the tee" : "the chosen ball";
  // pills: who has hit this stroke so far
  const pills = S.order.map(p => {
    if(S.strokeOutcomes[p]==null) return p===pid ? `<span class="pill" style="border-color:var(--accent)">${nm(p)} — now</span>` : `<span class="pill">${nm(p)}</span>`;
    const k=S.strokeOutcomes[p];
    const cls = k==='ob' ? 'ob' : k==='skip' ? 'skip' : '';
    return `<span class="pill ${cls}">${nm(p)}: ${LABEL[k]}</span>`;
  }).join("");

  let body;
  if(S.phase==="distance"){
    // Picking the shared spot's distance to target (one tap per stroke).
    const editing = S.turnIdx>0 || Object.keys(S.strokeOutcomes).length>0;
    const footer = editing
      ? `<button class="btn sm wide" onclick="pickDistance('${S.dist}')">Cancel</button>`
      : `<button class="btn sm wide" onclick="undo()">↶ Undo last shot</button>`;
    body = `
      <div class="turn">How far to the target?</div>
      <div class="muted">Stroke ${S.strokeNum} · where's the team shooting from?</div>
      <div class="grid" style="margin-top:12px">
        ${DISTANCES.map(d=>`<div class="chip outcome" onclick="pickDistance('${d.k}')">${d.label}</div>`).join("")}
      </div>
      ${footer}`;
  } else if(S.phase==="pickbest"){
    const cands = playableSet();
    body = `
      <div class="turn">Who had the best ball?</div>
      <div class="muted">Everyone plays the next stroke from here; this player goes first.</div>
      <div class="grid" style="margin-top:10px">
        ${cands.map(p=>`<button class="btn primary" onclick="pickBest(${p})">${nm(p)}<br><span class="muted">${LABEL[S.strokeOutcomes[p]]}</span></button>`).join("")}
      </div>
      <button class="btn sm wide" onclick="undo()">↶ Undo last shot</button>`;
  } else {
    body = `
      <div class="turn"><span class="who">${nm(pid)}</span>'s shot</div>
      <div class="fromspot">Stroke ${S.strokeNum} · playing from ${spot} · ${
        S.strokeNum===1 ? `<span class="pill">Tee</span>`
        : `<span class="pill" style="cursor:pointer;border-color:var(--accent)" onclick="editDistance()">${DLABEL[S.dist]||'?'} ✎</span>`
      }</div>
      <div>${pills}</div>
      <div class="grid" style="margin-top:12px">
        ${OUTCOMES.map(o=>`<div class="chip outcome ${o.k==='hole'?'hole':''}" onclick="logOutcome('${o.k}')">${o.label}</div>`).join("")}
      </div>
      <button class="btn sm wide skipbtn" onclick="logOutcome('skip')">⤼ ${nm(pid)} had to skip this shot</button>
      <div class="grid" style="margin-top:10px">
        <button class="btn sm ${S.pendMull?'primary':''}" onclick="toggleMull()"
          ${S.mulliganUsed&&!S.pendMull?'disabled style=opacity:.4':''}>
          ${S.pendMull?'✓ Mulligan armed':'Mulligan (free do-over)'}</button>
        <button class="btn sm" onclick="undo()">↶ Undo</button>
      </div>`;
  }
  app.innerHTML = `
    ${heroHTML(h)}
    <div class="card">
      ${body}
    </div>
    <button class="btn sm wide" style="opacity:.55;margin-top:4px"
      onclick="if(confirm('Start a new round? This clears the current one — export it first if you want to keep it. Use this to get back to setup and add players.')){localStorage.removeItem(KEY);S=newRound();render();}">⟳ New round / edit players</button>`;
}
function toggleMull(){ if(S.mulliganUsed&&!S.pendMull) return; S.pendMull=!S.pendMull; render(); }
function editDistance(){ S.phase="distance"; render(); }   // re-pick this stroke's distance

function renderFinish(){
  const payload = JSON.stringify(exportData(), null, 0);
  const contrib = S.active.map(pid=>{
    const mine = realShots().filter(x=>x.player_id===pid);
    const best = mine.filter(x=>x.best_ball).length;
    return `${nm(pid)}: ${mine.length} shots, ${best} best balls`;
  }).join(" · ");
  const t = teamTotal();
  app.innerHTML = `
    <div class="card">
      <h2>Round complete</h2>
      <div class="holeinfo">Team total: <b>${t}</b> vs target ${COURSE.target}
        — ${t<COURSE.target?'🏆 WIN':'no win'}.<br>${contrib}</div>
      <button class="btn primary wide" id="sendBtn" onclick="autoSendIt()">✅ Send round</button>
      <div id="sendStatus" class="holeinfo" style="display:none"></div>
      <button class="btn wide" onclick="copyIt()">📋 Copy round data (fallback)</button>
      <label>Round data (import with scripts/import_log.py)</label>
      <textarea id="payload" readonly>${payload}</textarea>
      <button class="btn sm wide" onclick="if(confirm('Clear this round and start fresh?')){localStorage.removeItem(KEY);S=newRound();render();}">🗑 Clear & new round</button>
    </div>`;
}
function exportData(){
  return { course:COURSE.name, schema_version:SCHEMA_VERSION,
           client_round_id:S.client_round_id, date:S.date,
           ground:S.ground||"", wind:S.wind||"", notes:S.notes,
           players:S.active.map(id=>S.roster.find(p=>p.player_id===id)),
           shots:S.shots };
}
function payloadStr(){ return JSON.stringify(exportData()); }
function emailIt(){
  const body = encodeURIComponent("Round data (JSON):\n\n"+payloadStr());
  location.href = `mailto:${EMAIL}?subject=${encodeURIComponent('Golf round '+S.date)}&body=${body}`;
}
function setSendStatus(msg, ok){
  const el = document.getElementById("sendStatus");
  if(!el) return;
  el.style.display = "block";
  el.style.color = ok===false ? "#ff9b9b" : ok===true ? "var(--accent)" : "var(--muted)";
  el.textContent = msg;
}
// Init the EmailJS SDK lazily — it's loaded async and may not be ready at startup.
// Returns false if the keys aren't configured or the SDK/network isn't available.
function ensureEmailjs(){
  if(!EMAILJS_READY || !window.emailjs) return false;
  if(!ensureEmailjs._done){ emailjs.init({ publicKey: EMAILJS.publicKey }); ensureEmailjs._done = true; }
  return true;
}
function autoSendIt(){
  if(!ensureEmailjs()){
    // Not configured yet (or offline / SDK blocked) — open the mail app instead.
    setSendStatus("Auto-send isn't set up — opening your mail app instead.", false);
    emailIt();
    return;
  }
  const btn = document.getElementById("sendBtn");
  if(btn) btn.disabled = true;
  setSendStatus("Sending…");
  emailjs.send(EMAILJS.serviceId, EMAILJS.templateId, {
    to_email:   EMAIL,
    subject:    "Golf round "+S.date,
    round_date: S.date,
    team_total: teamTotal(),
    round_json: payloadStr(),
  }).then(()=>{
    setSendStatus("✅ Round sent! You can close the app.", true);
  }).catch(err=>{
    if(btn) btn.disabled = false;
    const detail = (err && (err.text || err.message)) || err;
    setSendStatus("Couldn't auto-send ("+detail+"). Use “Copy round data” below.", false);
  });
}
async function shareIt(){
  if(navigator.share){ try{ await navigator.share({title:"Golf round "+S.date, text:payloadStr()}); }catch(e){} }
  else copyIt();
}
function copyIt(){
  const t=document.getElementById("payload"); const txt = t?t.value:payloadStr();
  navigator.clipboard?.writeText(txt).then(()=>alert("Copied!"), ()=>{ if(t){t.select();document.execCommand('copy');} });
}

render();
</script>
</body>
</html>
