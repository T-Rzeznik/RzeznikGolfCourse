<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1b5e20">
<title>Rzeznik Caddie</title>
<!--
  The stats caddie — a standalone app, separate from the round logger (index.html).
  It talks to the local server's /api/chat (the "brain" in golf/stats.py). It only
  knows rounds you've imported, and it never makes numbers up. Launch it with
  Caddie.bat; open on your phone via the QR on the /launch page.
-->
<style>
  :root { --green:#1b5e20; --green2:#2e7d32; --green3:#43a047; --bg:#0c120c; --card:#161d16; --card2:#1d261c;
          --line:#33402f; --txt:#e8f0e2; --muted:#9bb08c; --gold:#e8c98c; --accent:#7bd389; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--txt);
         font-size:17px; }
  header { background:linear-gradient(180deg,var(--green) 0%,#164a1a 100%); padding:11px 14px;
           position:sticky; top:0; z-index:10; box-shadow:0 2px 12px rgba(0,0,0,.4); }
  header .inner { max-width:560px; margin:0 auto; display:flex; align-items:center; gap:11px; }
  header .badge { width:38px; height:38px; border-radius:50%; flex:0 0 auto;
          background:radial-gradient(circle at 32% 27%,var(--green3),var(--green) 80%);
          box-shadow:inset 0 1px 0 rgba(255,255,255,.28),0 2px 8px rgba(0,0,0,.4);
          display:flex; align-items:center; justify-content:center; font-size:19px; }
  header h1 { font-size:17px; margin:0; letter-spacing:.3px; line-height:1.1; }
  header .sub { font-size:12px; color:#cfe8c4; margin-top:1px; }
  header .clear { margin-left:auto; background:rgba(0,0,0,.2); border:1px solid rgba(255,255,255,.12);
          color:#cfe8c4; font-size:12px; padding:6px 10px; border-radius:9px; cursor:pointer; }
  .wrap { max-width:560px; margin:0 auto; padding:0 14px; }

  /* ---- messages ---- */
  #chatScroll { padding:6px 0 96px; min-height:calc(100dvh - 150px); }
  .msg { display:flex; gap:9px; margin:15px 0; align-items:flex-end;
         animation:msgIn .3s cubic-bezier(.2,.85,.25,1) both; }
  @keyframes msgIn { from{ opacity:0; transform:translateY(9px); } to{ opacity:1; transform:none; } }
  .msg.me { flex-direction:row-reverse; }
  .avatar { flex:0 0 auto; width:34px; height:34px; border-radius:50%;
          background:radial-gradient(circle at 32% 27%,var(--green3),var(--green) 80%);
          box-shadow:inset 0 1px 0 rgba(255,255,255,.28),0 2px 8px rgba(0,0,0,.42);
          display:flex; align-items:center; justify-content:center; font-size:16px; }
  .stack { min-width:0; max-width:80%; }
  .bubble { display:inline-block; max-width:100%; padding:11px 14px; border-radius:17px; font-size:15.5px;
          line-height:1.46; border:1px solid var(--line); background:var(--card2); word-wrap:break-word;
          box-shadow:0 1px 4px rgba(0,0,0,.18); }
  .bubble.bot { border-bottom-left-radius:5px; }
  .msg.me .bubble { background:linear-gradient(165deg,var(--green2),#245a27); border-color:var(--accent);
          color:#f3fbef; border-bottom-right-radius:5px; }
  .msg.err .bubble { border-color:#7a4a4a; background:#2a1c1c; color:#f0c0c0; }
  .toolnote { margin:6px 2px 0; font-size:11.5px; color:var(--muted); letter-spacing:.2px;
          display:flex; align-items:center; gap:5px; }
  .toolnote b { color:var(--accent); font-weight:600; }
  .typing { display:inline-flex; gap:5px; padding:4px 2px; }
  .typing i { width:7px; height:7px; border-radius:50%; background:var(--accent);
          animation:blink 1.2s infinite ease-in-out; }
  .typing i:nth-child(2){ animation-delay:.18s; } .typing i:nth-child(3){ animation-delay:.36s; }
  @keyframes blink { 0%,65%,100%{ opacity:.25; transform:translateY(0); } 32%{ opacity:1; transform:translateY(-4px); } }

  /* ---- empty state ---- */
  .empty { text-align:center; padding:34px 6px 8px; animation:msgIn .4s ease both; }
  .empty .flag { font-size:44px; filter:drop-shadow(0 5px 12px rgba(0,0,0,.5)); }
  .empty h3 { font-size:22px; margin:14px 0 5px; color:var(--txt); letter-spacing:.2px; }
  .empty p { color:var(--muted); font-size:14px; margin:0 auto 20px; max-width:320px; line-height:1.5; }
  .examples { display:flex; flex-direction:column; gap:9px; }
  .example { text-align:left; padding:13px 15px; border-radius:14px; border:1px solid var(--line);
          background:linear-gradient(165deg,#1a221a,#141b13); color:var(--txt); font-size:14.5px;
          cursor:pointer; display:flex; align-items:center; gap:11px;
          transition:border-color .15s, transform .08s; }
  .example::before { content:"›"; color:var(--accent); font-weight:800; font-size:19px; line-height:1; }
  .example:active { transform:scale(.985); }
  .example:hover { border-color:var(--accent); }

  /* ---- input bar ---- */
  .inputbar { position:fixed; bottom:0; left:50%; transform:translateX(-50%);
          width:100%; max-width:560px; display:flex; gap:9px; padding:10px 14px 14px; z-index:9;
          background:linear-gradient(180deg,rgba(12,18,12,0),var(--bg) 30%); }
  .inputbar input { flex:1; padding:13px 16px; border-radius:999px; border:1px solid var(--line);
          background:#0c100b; color:var(--txt); font-size:16px; }
  .inputbar input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(123,211,137,.13); }
  .send { flex:0 0 auto; width:50px; height:50px; border-radius:50%; border:none; cursor:pointer;
          background:radial-gradient(circle at 35% 30%,var(--green3),var(--green2) 82%); color:#fff;
          font-size:21px; line-height:1; display:flex; align-items:center; justify-content:center;
          box-shadow:0 3px 12px rgba(0,0,0,.42); transition:transform .08s, opacity .15s; }
  .send:active { transform:scale(.9); }
  .send:disabled { opacity:.4; cursor:default; }
</style>
</head>
<body>
<header>
  <div class="inner">
    <div class="badge">⛳</div>
    <div>
      <h1>Rzeznik Caddie</h1>
      <div class="sub">your backyard golf stats, on tap</div>
    </div>
    <button class="clear" id="clearBtn" style="display:none" onclick="clearChat()">Clear</button>
  </div>
</header>
<div class="wrap">
  <div id="chatScroll"></div>
</div>
<div class="inputbar">
  <input id="chatText" placeholder="Ask about the stats…" autocomplete="off" enterkeyhint="send" inputmode="text">
  <button class="send" id="chatSend" aria-label="Send">▸</button>
</div>

<script>
// The caddie answers ONLY from logged rounds, via /api/chat (the "brain").
const CHAT_KEY = "rzeznik_caddie_v1";
let CHAT = loadChat();            // [{role:'user'|'bot', text, tool_calls?, pending?, error?}]
let chatBusy = false;
const EXAMPLES = [
  "Which hole is hardest?",
  "Who's got the best make-rate?",
  "Who's more likely to make a tap-in?",
];
function loadChat(){ try { return JSON.parse(localStorage.getItem(CHAT_KEY)) || []; } catch(e){ return []; } }
function saveChat(){ localStorage.setItem(CHAT_KEY, JSON.stringify(CHAT.filter(m=>!m.pending))); }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmt(s){ return esc(s).replace(/\n/g, "<br>"); }

const scroll = document.getElementById("chatScroll");
const input = document.getElementById("chatText");
const sendBtn = document.getElementById("chatSend");
const clearBtn = document.getElementById("clearBtn");

function render(){
  clearBtn.style.display = CHAT.length ? "block" : "none";
  scroll.innerHTML = CHAT.length ? CHAT.map(bubble).join("") : emptyState();
  sendBtn.disabled = chatBusy;
  requestAnimationFrame(()=>window.scrollTo(0, document.body.scrollHeight));
}

function emptyState(){
  return `<div class="empty">
    <div class="flag">⛳</div>
    <h3>Ask your caddie</h3>
    <p>I answer from the rounds you've logged — make-rates, matchups, hole difficulty.
       I won't make numbers up.</p>
    <div class="examples">
      ${EXAMPLES.map((q,i)=>`<button class="example" onclick="askExample(${i})">${esc(q)}</button>`).join("")}
    </div>
  </div>`;
}
function askExample(i){ sendChat(EXAMPLES[i]); }

function bubble(m){
  if(m.role==="user")
    return `<div class="msg me"><div class="stack"><div class="bubble">${fmt(m.text)}</div></div></div>`;
  if(m.pending)
    return `<div class="msg"><div class="avatar">⛳</div><div class="stack">
      <div class="bubble bot"><span class="typing"><i></i><i></i><i></i></span></div></div></div>`;
  const names = m.tool_calls && m.tool_calls.length
    ? [...new Set(m.tool_calls.map(t=>t.name))].join(", ") : "";
  const note = names ? `<div class="toolnote">checked <b>${esc(names)}</b></div>` : "";
  return `<div class="msg ${m.error?'err':''}"><div class="avatar">⛳</div><div class="stack">
    <div class="bubble bot">${fmt(m.text)}</div>${note}</div></div>`;
}

async function sendChat(text){
  text = (text||"").trim();
  if(!text || chatBusy) return;
  // History = completed turns before this one (skip pending + error bubbles).
  const history = CHAT.filter(m=>!m.pending && !m.error).map(m=>({role:m.role, text:m.text}));
  CHAT.push({role:"user", text});
  CHAT.push({role:"bot", pending:true});
  chatBusy = true; input.value = ""; saveChat(); render();
  let msg;
  try {
    const r = await fetch("/api/chat", { method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ message:text, history }) });
    const data = await r.json().catch(()=>({}));
    msg = { role:"bot", text:data.reply || "(no answer)", tool_calls:data.tool_calls, error:!r.ok };
  } catch(e) {
    msg = { role:"bot", error:true,
            text:"Can't reach the caddie. Make sure the laptop server is running and your phone is on the same wifi." };
  }
  CHAT.pop();                     // drop the typing bubble
  CHAT.push(msg);
  chatBusy = false; saveChat(); render();
  input.focus();
}
function clearChat(){ if(confirm("Clear this chat?")){ CHAT = []; saveChat(); render(); } }

sendBtn.onclick = () => sendChat(input.value);
input.onkeydown = e => { if(e.key==="Enter"){ e.preventDefault(); sendChat(input.value); } };
render();
</script>
</body>
</html>
